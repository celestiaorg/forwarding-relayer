global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: forwarding-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - forwarding-backend:9091

  - job_name: forwarding-relayer
    metrics_path: /metrics
    static_configs:
      - targets:
          - forwarding-relayer:9092
