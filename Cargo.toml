[package]
name = "forwarding-relayer"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.42", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
cosmrs = { version = "0.19", features = ["cosmwasm", "rpc", "grpc"] }
cosmos-sdk-proto = { version = "0.26", features = ["grpc", "cosmwasm"] }
tonic = "0.12"
prost = "0.13"
prost-types = "0.13"
hex = "0.4"
bech32 = "0.11"
sha2 = "0.10"
clap = { version = "4.5", features = ["derive", "env"] }
tendermint-rpc = { version = "0.39", features = ["http-client"] }
bip32 = "0.5"
bip39 = { version = "2.1", features = ["std"] }
axum = "0.7"
tower = "0.5"
chrono = "0.4"
rusqlite = { version = "0.32", features = ["bundled"] }
